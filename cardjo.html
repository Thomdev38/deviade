<head>

	<title>Cardjo · Redirection vers l'app</title>

	<link rel="preconnect" href="https://fonts.googleapis.com">

	<link rel="stylesheet" href="assets/css/modern.css" />

	<style>
		.redirect-stage {
			min-height: 100vh;
			display: grid;
			place-items: center;
			padding: 40px 20px;
		}
		.redirect-card {
			text-align: center;
			max-width: 480px;
		}
		.redirect-logo {
			width: 132px;
			height: 132px;
			border-radius: 32px;
			margin: 0 auto 32px;
			background: linear-gradient(155deg, #1a1a26 0%, #0d0d14 100%);
			border: 1px solid var(--border-strong);
			padding: 12px;
			animation: pulse-card 2.5s ease-in-out infinite;
			box-shadow: 0 30px 80px -10px rgba(245, 158, 11, 0.4), 0 20px 60px -20px rgba(236, 72, 153, 0.4);
		}
		.redirect-logo img { width: 100%; height: 100%; border-radius: 22px; object-fit: cover; }
		@keyframes pulse-card {
			0%, 100% { transform: scale(1); }
			50% { transform: scale(1.04); }
		}
		.dots::after {
			content: '';
			display: inline-block;
			width: 24px;
			text-align: left;
			animation: dots 1.5s steps(4, end) infinite;
		}
		@keyframes dots {
			0% { content: ''; }
			25% { content: '.'; }
			50% { content: '..'; }
			75% { content: '...'; }
		}
	</style>
	<script>
		window.onload = function () {
			const userAgent = navigator.userAgent || navigator.vendor || window.opera;
			if (/android/i.test(userAgent)) {
				window.location.href = "https://play.google.com/store/apps/details?id=com.thomas.skyjo";
			} else if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
				window.location.href = "https://apps.apple.com/app/id6745458294";
			} else {
				window.location.href = "https://play.google.com/store/apps/details?id=com.thomas.skyjo";
			}
		};
	</script>
</head>
<body>
	<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-MK529T4G" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>

	<div class="bg-mesh"><div class="blob-3"></div></div>
	<div class="bg-grid"></div>

	<div class="redirect-stage">
		<div class="redirect-card">
			<div class="redirect-logo">
				<img src="images/cardjo.png" alt="Cardjo Logo">
			</div>
			<span class="eyebrow">Cardjo</span>
			<h1 class="h-display" style="font-size: clamp(2rem, 5vw, 3rem); margin-bottom: 16px;">
				Redirection vers le <span class="gradient-text">store</span><span class="dots"></span>
			</h1>
			<p class="lead" style="margin: 0 auto 32px;">
				Vous allez être redirigé vers la boutique d'applications correspondant à votre appareil.
			</p>
			<div class="cta-stores">
				<a class="btn-store" href="https://apps.apple.com/app/id6745458294" target="_blank" rel="noopener">
					<svg class="store-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
					<span class="store-text"><small>Télécharger sur</small><strong>App Store</strong></span>
				</a>
				<a class="btn-store" href="https://play.google.com/store/apps/details?id=com.thomas.skyjo" target="_blank" rel="noopener">
					<svg class="store-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M3.1 1.32A2 2 0 0 0 3 2v20a2 2 0 0 0 .1.68L13.55 12 3.1 1.32zm11.86 11.39l3.4 3.42-12.4 7.07a1.97 1.97 0 0 1-.6-.13l9.6-10.36zm5.5-1.66l-3.8-2.17-3.97 4.12 3.97 4.12 3.8-2.17a2 2 0 0 0 0-3.9zM4.96.99c-.21.04-.42.11-.6.22L14.96 11.3l3.4-3.42L4.96.99z"/></svg>
					<span class="store-text"><small>Disponible sur</small><strong>Google Play</strong></span>
				</a>
			</div>
			<p style="margin-top: 30px; font-size: 0.9rem;">
				<a href="cardjo_privacy.html" style="color: var(--text-muted);">Politique de confidentialité</a>
				·
				<a href="index.html" style="color: var(--text-muted);">Retour au site</a>
			</p>
		</div>
	</div>
</body>
</html>
